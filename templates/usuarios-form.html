<!DOCTYPE html>

<head>

  <title>Novo Usuário</title>

</head>
<body>

<div class="layout">

  <aside class="sidebar">

    <span class="version">Versão 1.0</span>

      <a href="dashboard.html">Dashboard</a>

      <a href="livros.html">Livros</a>

  <main class="main">

    <h1>Novo Usuário</h1>

    <div class="panel">
      <form id="usuarioForm">
        <label>Nome</label>
        <input type="text" id="nome" required>

        <label>E-mail</label>
        <input type="text" id="email" required>

        <label>Telefone</label>
        <input type="text" id="telefone" required>

        <br><br>
        <button class="btn">Salvar</button>
        <button type="button" class="btn-cancelar" onclick="window.location.href='usuarios.html'">
        Cancelar </button>
      </form>
    </div>

  </main>

</div>

<script src="js/usuario-form.js"></script>
