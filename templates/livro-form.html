<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Livro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>Sistema Biblioteca</h2>
    <span class="version">Versão 1.0</span>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="emprestimos.html">Empréstimos</a>
      <a class="active" href="livros.html">Livros</a>
      <a href="usuarios.html">Usuários</a>
    </nav>
  </aside>

  <main class="main">

    <h1>Novo Livro</h1>

    <div class="panel">
      <form>
        <label>Título</label>
        <input type="text" id="titulo" required>

        <label>Autor</label>
        <input type="text" id="autor" required>

        <label>Categoria</label>
        <input type="text" id="categoria" required>

        <label>ISBN</label>
        <input type="text" id="isbn" required>

        <label>Quantidade Total</label>
        <input type="number" id="total" min="1" required>

        <br><br>
        <button class="btn">Salvar</button>
        <button type="button" class="btn-cancelar" onclick="window.location.href='livros.html'">
        Cancelar </button>
      </form>
    </div>

  </main>

</div>

<script src="js/livro-form.js"></script>

</body>
</html>
